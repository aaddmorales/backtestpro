<!--
  BotTested — Landing v3 · 19/06/2026
  NOVO nesta versão: i18n completo EN / ES / PT.
   - A landing DETECTA a língua do browser e abre nela automaticamente.
   - Ordem de prioridade / fallback: EN → ES → PT (inglês é o padrão global).
   - Seletor manual no topo (ordem EN · ES · PT); a escolha troca a página na hora
     e é salva em localStorage ('bt_lang') para o app/cadastro carregar no idioma escolhido.
   - Em produção (bottested.com) o localStorage persiste; no preview de artifact ele é
     bloqueado, então há fallback seguro (não quebra; apenas não persiste no preview).
  Single-file HTML+CSS+JS. Trocar [PREÇO]/[PRICE]/[PRECIO] quando o pricing fechar.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BotTested</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#040b14;--bg-2:#081523;--surface:rgba(11,22,36,.66);--surface-2:rgba(13,26,43,.86);
    --line:rgba(120,150,180,.14);--green:#00d886;--green-2:#0a8f59;--green-soft:rgba(0,216,134,.13);
    --amber:#ffb830;--amber-soft:rgba(255,184,48,.12);--red:#ff5c5c;--red-soft:rgba(255,92,92,.12);
    --ink:#eef3f8;--muted:#9fb0c3;--muted-2:#6f8298;
    --disp:"Space Grotesk",system-ui,sans-serif;--body:"Inter",system-ui,sans-serif;--mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--green);color:#03130c}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px;position:relative;z-index:2}

  .atmos{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .atmos .grid{position:absolute;inset:0;opacity:.4;
    background-image:linear-gradient(rgba(120,150,180,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(120,150,180,.05) 1px,transparent 1px);
    background-size:54px 54px;mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,#000 30%,transparent 75%)}
  .blob{position:absolute;border-radius:50%;filter:blur(90px);will-change:transform,opacity}
  .blob.g{width:680px;height:520px;top:-180px;right:-120px;background:rgba(0,216,134,.22);animation:drift1 14s ease-in-out infinite}
  .blob.a{width:520px;height:440px;top:120px;left:-160px;background:rgba(255,184,48,.10);animation:drift2 17s ease-in-out infinite}
  .blob.g2{width:420px;height:360px;top:380px;right:18%;background:rgba(0,216,134,.10);animation:drift2 19s ease-in-out infinite}
  @keyframes drift1{0%,100%{transform:translate(0,0) scale(1);opacity:.9}50%{transform:translate(-40px,40px) scale(1.08);opacity:1}}
  @keyframes drift2{0%,100%{transform:translate(0,0) scale(1);opacity:.8}50%{transform:translate(40px,-30px) scale(1.1);opacity:1}}
  .candles{position:absolute;left:0;right:0;bottom:0;height:62vh;min-height:440px;opacity:.55;
    mask-image:linear-gradient(180deg,transparent 18%,#000 62%);}
  .candles .ma{fill:none;stroke-width:2.4;opacity:.9;stroke-linejoin:round;stroke-linecap:round}

  nav{position:sticky;top:0;z-index:30;backdrop-filter:blur(14px);background:linear-gradient(180deg,rgba(4,11,20,.9),rgba(4,11,20,.4));border-bottom:1px solid var(--line)}
  .nav-in{display:flex;align-items:center;gap:28px;height:70px}
  .logo{display:flex;align-items:center;gap:10px;font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:-.02em}
  .logo .mark{width:24px;height:24px;border-radius:7px;background:conic-gradient(from 200deg,var(--green),var(--green-2) 55%,var(--green));box-shadow:0 0 0 1px rgba(0,216,134,.5) inset,0 0 26px rgba(0,216,134,.45)}
  .logo b{color:var(--amber)}
  .nav-links{display:flex;gap:26px;margin-left:8px}
  .nav-links a{color:var(--muted);font-size:14.5px;font-weight:500}
  .nav-links a:hover{color:var(--ink)}
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:14px}

  /* seletor de idioma */
  .lang{display:flex;gap:2px;border:1px solid var(--line);border-radius:10px;padding:3px;background:rgba(4,11,20,.6)}
  .lang button{border:0;background:transparent;color:var(--muted-2);font-family:var(--mono);font-size:12px;letter-spacing:.04em;
    padding:6px 9px;border-radius:7px;cursor:pointer;transition:.16s}
  .lang button:hover{color:var(--ink)}
  .lang button[aria-pressed="true"]{background:var(--green-soft);color:var(--green);box-shadow:0 0 0 1px rgba(0,216,134,.3) inset}

  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14.5px;padding:11px 18px;border-radius:11px;border:1px solid transparent;cursor:pointer;transition:.18s}
  .btn-ghost{color:var(--ink);border-color:var(--line);background:transparent}
  .btn-ghost:hover{border-color:rgba(120,150,180,.4)}
  .btn-go{background:linear-gradient(180deg,var(--green),#03b873);color:#02160d;box-shadow:0 10px 34px -10px rgba(0,216,134,.65)}
  .btn-go:hover{transform:translateY(-1px);box-shadow:0 16px 44px -10px rgba(0,216,134,.85)}

  header{padding:78px 0 56px;position:relative}
  .hero{display:grid;grid-template-columns:1.05fr .95fr;gap:54px;align-items:center}
  .reveal{opacity:0;transform:translateY(16px);animation:up .7s cubic-bezier(.2,.7,.2,1) forwards}
  .d1{animation-delay:.05s}.d2{animation-delay:.16s}.d3{animation-delay:.27s}.d4{animation-delay:.38s}.d5{animation-delay:.5s}
  @keyframes up{to{opacity:1;transform:none}}
  .pill{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12.5px;letter-spacing:.02em;color:var(--ink);
    background:rgba(0,216,134,.08);border:1px solid rgba(0,216,134,.3);padding:8px 14px;border-radius:999px;box-shadow:0 0 30px -10px rgba(0,216,134,.5)}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.8)}}
  .pill b{color:var(--green);font-weight:700}
  h1{font-family:var(--disp);font-weight:700;letter-spacing:-.03em;line-height:1.02;font-size:clamp(36px,5vw,62px);margin:22px 0 20px}
  h1 .grad{background:linear-gradient(100deg,var(--amber),#ffd47a 60%,var(--amber));-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:clamp(16px,1.4vw,18.5px);max-width:34ch}
  .sub b{color:var(--ink);font-weight:600}
  .cta-row{display:flex;flex-wrap:wrap;gap:14px;margin-top:32px}
  .btn-lg{padding:16px 26px;font-size:15.5px;border-radius:13px}
  .hint{margin-top:16px;color:var(--muted-2);font-size:13px;font-family:var(--mono)}
  .hint b{color:var(--amber);font-weight:500}

  .verdict-stage{position:relative}
  .verdict-stage::before{content:"";position:absolute;inset:-30px -10px;z-index:0;background:radial-gradient(60% 55% at 60% 40%,rgba(0,216,134,.28),transparent 70%);filter:blur(20px)}
  .verdict{position:relative;z-index:1;border-radius:22px;padding:6px;background:linear-gradient(180deg,rgba(16,30,48,.92),rgba(9,18,30,.92));
    border:1px solid rgba(140,170,200,.16);box-shadow:0 50px 100px -45px rgba(0,0,0,.9),0 0 0 1px rgba(0,216,134,.06) inset;backdrop-filter:blur(8px);overflow:hidden;animation:float 7s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .verdict::after{content:"";position:absolute;top:0;left:-60%;width:45%;height:100%;z-index:5;pointer-events:none;background:linear-gradient(105deg,transparent,rgba(255,255,255,.07),transparent);transform:skewX(-18deg);animation:sheen 6.5s ease-in-out infinite}
  @keyframes sheen{0%,72%{left:-60%}86%{left:130%}100%{left:130%}}
  .verdict-head{display:flex;align-items:center;gap:10px;padding:15px 16px 12px}
  .verdict-head .vmark{width:17px;height:17px;border-radius:5px;background:conic-gradient(from 200deg,var(--green),var(--green-2))}
  .verdict-head .vname{font-family:var(--mono);font-size:13px;color:var(--ink)}
  .verdict-head .vtag{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted-2);border:1px solid var(--line);padding:3px 8px;border-radius:7px}
  .toggle{display:flex;background:rgba(4,11,20,.7);border:1px solid var(--line);border-radius:12px;padding:4px;margin:0 16px 14px;position:relative;z-index:6}
  .toggle button{flex:1;border:0;background:transparent;color:var(--muted);cursor:pointer;font-family:var(--body);font-weight:600;font-size:13.5px;padding:10px 8px;border-radius:9px;transition:.18s}
  .toggle button[aria-pressed="true"].t-vit{background:var(--amber-soft);color:var(--amber);box-shadow:0 0 0 1px rgba(255,184,48,.32) inset}
  .toggle button[aria-pressed="true"].t-rx{background:var(--green-soft);color:var(--green);box-shadow:0 0 0 1px rgba(0,216,134,.38) inset}
  .panel{padding:6px 16px 18px;min-height:290px;position:relative;z-index:2}
  .view{display:none;animation:rise .42s ease both}
  .view.on{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .big{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin:2px 0 4px}
  .big .num{font-family:var(--mono);font-weight:700;font-size:48px;letter-spacing:-.02em}
  .num.up{color:var(--green)} .num.warn{color:var(--red)}
  .big .cap{font-size:13px;color:var(--muted)}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:13px;overflow:hidden;margin-top:14px}
  .metric{background:rgba(8,18,30,.9);padding:13px 14px}
  .metric .k{font-size:11.5px;color:var(--muted-2);font-family:var(--mono);letter-spacing:.03em;text-transform:uppercase}
  .metric .v{font-family:var(--mono);font-weight:700;font-size:19px;margin-top:3px}
  .v.good{color:var(--green)} .v.bad{color:var(--red)} .v.neutral{color:var(--ink)}
  .verdict-line{display:flex;align-items:center;gap:10px;margin-top:15px;font-size:14px}
  .badge{font-family:var(--mono);font-weight:700;font-size:12px;padding:5px 10px;border-radius:8px;letter-spacing:.02em}
  .badge.seduce{background:var(--amber-soft);color:var(--amber)}
  .badge.approved{background:var(--green-soft);color:var(--green)}
  .badge.fragile{background:var(--red-soft);color:var(--red)}
  .vline-txt{color:var(--muted)} .vline-txt.warnt{color:#ffd9d9}

  .trust{border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(9,21,35,.55),transparent)}
  .trust-in{display:flex;flex-wrap:wrap;gap:10px 30px;align-items:center;justify-content:center;padding:18px 0;font-family:var(--mono);font-size:13px;color:var(--muted)}
  .trust-in span{display:inline-flex;align-items:center;gap:8px}
  .trust-in .tick{color:var(--green)} .trust-in .sep{color:var(--muted-2)}

  section{padding:88px 0;position:relative;z-index:2}
  .sec-eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--green)}
  h2{font-family:var(--disp);font-weight:700;letter-spacing:-.02em;font-size:clamp(26px,3vw,38px);margin:12px 0 0;line-height:1.1}
  .sec-sub{color:var(--muted);max-width:54ch;margin-top:14px;font-size:16px}
  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:44px}
  .step{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px 22px;backdrop-filter:blur(6px)}
  .step .n{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--green);border:1px solid rgba(0,216,134,.3);width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--green-soft)}
  .step h3{font-family:var(--disp);font-weight:600;font-size:18.5px;margin:16px 0 8px}
  .step p{color:var(--muted);font-size:14.5px}
  .moat{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:44px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px;backdrop-filter:blur(6px)}
  .card .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:16px}
  .ic.g{background:var(--green-soft);color:var(--green)} .ic.a{background:var(--amber-soft);color:var(--amber)}
  .card h3{font-family:var(--disp);font-weight:600;font-size:18px;margin:14px 0 8px}
  .card p{color:var(--muted);font-size:14.5px}

  .price-grid{display:grid;grid-template-columns:1fr 1.15fr;gap:18px;margin-top:44px;max-width:760px}
  .plan{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:28px;display:flex;flex-direction:column;backdrop-filter:blur(6px)}
  .plan.feat{border-color:rgba(0,216,134,.42);box-shadow:0 0 0 1px rgba(0,216,134,.15),0 40px 80px -45px rgba(0,216,134,.45)}
  .plan .pname{font-family:var(--disp);font-weight:600;font-size:20px}
  .plan .ptag{color:var(--muted-2);font-size:13.5px;margin-top:4px}
  .plan .pprice{font-family:var(--mono);font-weight:700;font-size:38px;margin:18px 0 2px}
  .plan .pprice small{font-size:15px;color:var(--muted);font-weight:500}
  .plan ul{list-style:none;margin:18px 0 22px;display:flex;flex-direction:column;gap:10px}
  .plan li{font-size:14.5px;color:var(--muted);display:flex;gap:10px}
  .plan li::before{content:"✓";color:var(--green);font-weight:700}
  .plan .btn{justify-content:center;margin-top:auto}
  .feat-tag{align-self:flex-start;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--green);background:var(--green-soft);border:1px solid rgba(0,216,134,.3);padding:4px 9px;border-radius:999px;margin-bottom:14px}

  footer{border-top:1px solid var(--line);padding:54px 0 40px;background:var(--bg-2);position:relative;z-index:2}
  .foot-top{display:flex;flex-wrap:wrap;gap:30px;justify-content:space-between;align-items:flex-start}
  .foot-cta h3{font-family:var(--disp);font-weight:700;font-size:24px;max-width:20ch;line-height:1.15;margin-top:14px}
  .foot-links{display:flex;gap:48px;flex-wrap:wrap}
  .foot-col h4{font-size:12px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);margin-bottom:12px}
  .foot-col a{display:block;color:var(--muted);font-size:14px;margin-bottom:9px}
  .foot-col a:hover{color:var(--ink)}
  .disclaimer{margin-top:36px;padding-top:22px;border-top:1px solid var(--line);color:var(--muted-2);font-size:12.5px;line-height:1.6;max-width:90ch}
  .copy{margin-top:16px;color:var(--muted-2);font-size:12.5px;font-family:var(--mono)}

  @media(max-width:860px){
    .hero{grid-template-columns:1fr;gap:40px}.nav-links{display:none}
    .steps,.moat,.price-grid{grid-template-columns:1fr}.sub{max-width:none}
    header{padding:48px 0 30px}section{padding:62px 0}.blob.g{width:420px;height:340px}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}.reveal{opacity:1;transform:none}}
  :focus-visible{outline:2px solid var(--green);outline-offset:3px;border-radius:6px}
</style>

<div class="atmos" aria-hidden="true">
  <div class="grid"></div><div class="blob g"></div><div class="blob a"></div><div class="blob g2"></div>
  <svg class="candles" viewBox="0 0 1440 460" preserveAspectRatio="none"><g id="candleset"></g></svg>
</div>

<nav>
  <div class="wrap nav-in">
    <a class="logo" href="#"><span class="mark"></span><span><b>Bot</b>Tested</span></a>
    <div class="nav-links">
      <a href="#como" data-i="nav_how"></a>
      <a href="#confiar" data-i="nav_why"></a>
      <a href="#precos" data-i="nav_price"></a>
    </div>
    <div class="nav-right">
      <div class="lang" role="group" aria-label="Language">
        <button data-lang="en" onclick="setLang('en',true)">EN</button>
        <button data-lang="es" onclick="setLang('es',true)">ES</button>
        <button data-lang="pt" onclick="setLang('pt',true)">PT</button>
      </div>
      <a class="btn btn-go" href="#precos" data-i="nav_cta"></a>
    </div>
  </div>
</nav>

<header>
  <div class="wrap hero">
    <div>
      <span class="pill reveal d1"><span class="dot"></span><span data-i="pill"></span></span>
      <h1 class="reveal d2"><span data-i="h1a"></span> <span class="grad" data-i="h1b"></span></h1>
      <p class="sub reveal d3" data-i="sub"></p>
      <div class="cta-row reveal d4">
        <a class="btn btn-go btn-lg" href="#precos" data-i="cta1"></a>
        <a class="btn btn-ghost btn-lg" href="#como" data-i="cta2"></a>
      </div>
      <p class="hint reveal d5" data-i="hint"></p>
    </div>

    <div class="verdict-stage reveal d3">
      <div class="verdict" id="verdict">
        <div class="verdict-head">
          <span class="vmark"></span><span class="vname">estrategia_breakout.v3</span><span class="vtag">XAU/USD · D1</span>
        </div>
        <div class="toggle" role="group">
          <button class="t-rx" aria-pressed="true" onclick="setView('app')" data-i="tg_app"></button>
          <button class="t-vit" aria-pressed="false" onclick="setView('rej')" data-i="tg_rej"></button>
        </div>
        <div class="panel" id="p-app">
          <div class="view on" id="v-app">
            <div class="big"><span class="num up">+41%</span><span class="cap" data-i="app_cap"></span></div>
            <div class="metrics">
              <div class="metric"><div class="k">Sharpe</div><div class="v good">1,8</div></div>
              <div class="metric"><div class="k" data-i="m_dd"></div><div class="v neutral">−11%</div></div>
              <div class="metric"><div class="k" data-i="m_oos"></div><div class="v good">+3,2%</div></div>
              <div class="metric"><div class="k" data-i="m_period"></div><div class="v neutral" data-i="m_period_v"></div></div>
            </div>
            <div class="verdict-line"><span class="badge approved" data-i="app_badge"></span><span class="vline-txt" data-i="app_line"></span></div>
          </div>
        </div>
        <div class="panel" id="p-rej" style="display:none">
          <div class="view on" id="v-rej">
            <div class="big"><span class="num warn">−54%</span><span class="cap" data-i="rej_cap"></span></div>
            <div class="metrics">
              <div class="metric"><div class="k">Sharpe</div><div class="v bad">0,32</div></div>
              <div class="metric"><div class="k" data-i="m_avgloss"></div><div class="v bad" data-i="m_avgloss_v"></div></div>
              <div class="metric"><div class="k" data-i="m_oos"></div><div class="v bad">−2,1%</div></div>
              <div class="metric"><div class="k" data-i="m_period"></div><div class="v neutral" data-i="m_period_v"></div></div>
            </div>
            <div class="verdict-line"><span class="badge fragile" data-i="rej_badge"></span><span class="vline-txt warnt" data-i="rej_line"></span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="trust">
  <div class="wrap trust-in">
    <span><span class="tick">✓</span> <span data-i="t1"></span></span><span class="sep">·</span>
    <span><span class="tick">✓</span> <span data-i="t2"></span></span><span class="sep">·</span>
    <span><span class="tick">✓</span> <span data-i="t3"></span></span><span class="sep">·</span>
    <span><span class="tick">✓</span> <span data-i="t4"></span></span><span class="sep">·</span>
    <span><span class="tick">✓</span> PT · EN · ES</span>
  </div>
</div>

<section id="como">
  <div class="wrap">
    <span class="sec-eyebrow" data-i="s1_eye"></span>
    <h2 data-i="s1_h"></h2>
    <p class="sec-sub" data-i="s1_sub"></p>
    <div class="steps">
      <div class="step"><div class="n">1</div><h3 data-i="st1_h"></h3><p data-i="st1_p"></p></div>
      <div class="step"><div class="n">2</div><h3 data-i="st2_h"></h3><p data-i="st2_p"></p></div>
      <div class="step"><div class="n">3</div><h3 data-i="st3_h"></h3><p data-i="st3_p"></p></div>
    </div>
  </div>
</section>

<section id="confiar">
  <div class="wrap">
    <span class="sec-eyebrow" data-i="s2_eye"></span>

  /* persistência segura (não quebra no preview onde localStorage é bloqueado) */
  function saveLang(l){ try{ localStorage.setItem('bt_lang', l); }catch(e){} }
  function readLang(){ try{ return localStorage.getItem('bt_lang'); }catch(e){ return null; } }

  /* detecção: escolha salva > língua do browser > fallback EN. Ordem suportada: EN, ES, PT */
  function detectLang(){
    var saved = readLang();
    if(saved && I18N[saved]) return saved;
    var navs = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language || 'en'];
    for(var i=0;i<navs.length;i++){
      var code = (navs[i]||'').slice(0,2).toLowerCase();
      if(code==='pt') return 'pt';
      if(code==='es') return 'es';
      if(code==='en') return 'en';
    }
    return 'en'; /* fallback global */
  }

  function setLang(lang, persist){
    if(!I18N[lang]) lang='en';
    var dict = I18N[lang];
    document.documentElement.setAttribute('lang', lang);
    document.querySelectorAll('[data-i]').forEach(function(el){
      var k = el.getAttribute('data-i');
      if(dict[k]!=null) el.innerHTML = dict[k];
    });
    document.querySelectorAll('.lang button').forEach(function(b){
      b.setAttribute('aria-pressed', b.getAttribute('data-lang')===lang);
    });
    if(persist) saveLang(lang); /* lembra a escolha pro app/cadastro carregar nessa língua */
  }

  /* candles maiores + duas médias móveis por cima (canal de médias) */
  (function(){
    var g=document.getElementById('candleset');if(!g)return;
    var cw=27, gap=13, pitch=cw+gap, n=Math.ceil(1440/pitch)+1;
    var html='', closes=[], y=360, x=4;
    for(var i=0;i<n;i++){
      var dir=Math.random()>0.45?-1:1;
      var body=18+Math.random()*58;
      var openY=y, closeY=y+dir*body;
      var topY=Math.min(openY,closeY), botY=Math.max(openY,closeY);
      var wickTop=topY-(8+Math.random()*30), wickBot=botY+(8+Math.random()*30);
      var up=closeY<openY, col=up?'#00d886':'#ff5c5c', cx=x+cw/2;
      html+='<line x1="'+cx.toFixed(1)+'" y1="'+wickTop.toFixed(1)+'" x2="'+cx.toFixed(1)+'" y2="'+wickBot.toFixed(1)+'" stroke="'+col+'" stroke-width="1.4" opacity=".5"/>';
      html+='<rect x="'+x.toFixed(1)+'" y="'+topY.toFixed(1)+'" width="'+cw+'" height="'+(botY-topY).toFixed(1)+'" rx="2" fill="'+col+'" opacity=".72"/>';
      closes.push({x:cx, y:closeY});
      y=closeY-2.6;                       // tendência de alta suave
      if(y<95)y=95; if(y>400)y=400;
      x+=pitch;
    }
    function ma(period,color){
      var pts=[];
      for(var i=period-1;i<closes.length;i++){
        var s=0; for(var j=i-period+1;j<=i;j++) s+=closes[j].y;
        pts.push(closes[i].x.toFixed(1)+','+(s/period).toFixed(1));
      }
      return '<polyline class="ma" stroke="'+color+'" points="'+pts.join(' ')+'"/>';
    }
    g.innerHTML = html + ma(4,'#ffb830') + ma(10,'#00d886');  // média rápida (âmbar) + lenta (verde)
  })();

  function setView(which){
    var app=which==='app';
    document.getElementById('p-app').style.display=app?'block':'none';
    document.getElementById('p-rej').style.display =app?'none':'block';
    document.querySelector('.t-rx').setAttribute('aria-pressed',app);
    document.querySelector('.t-vit').setAttribute('aria-pressed',!app);
    var v=document.getElementById(app?'v-app':'v-rej');
    v.style.animation='none';void v.offsetWidth;v.style.animation='';
  }

  var interacted=false;
  document.querySelectorAll('.toggle button').forEach(function(b){b.addEventListener('click',function(){interacted=true;});});
  if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    // mostra a "reprovada" rapidinho pra ensinar o contraste, e volta pra "aprovada" (entrada positiva)
    setTimeout(function(){ if(!interacted){setView('rej');setTimeout(function(){if(!interacted)setView('app');},1700);} },3000);
  }

  /* inicializa no idioma detectado (automático na primeira visita) */
  setLang(detectLang(), false);
